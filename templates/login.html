{% extends 'base.html' %}
{% block title %}Connexion — MotoGP Jeu{% endblock %}

{% block content %}
  <h2>Connexion joueur</h2>
  <p class="muted">Choisis ton pseudo puis saisis ton code secret.</p>

  <form method="post" class="card">

    <label for="pseudo">Pseudo</label>
    <select name="pseudo" id="pseudo" required>
      <option value="">-- Sélectionne ton pseudo --</option>

      {% for p in participants %}
        <option value="{{ p.pseudo }}"
          {% if selected_pseudo and selected_pseudo == p.pseudo %}selected{% endif %}>
          {{ p.pseudo }}
        </option>
      {% endfor %}
    </select>

    <label for="secret" style="margin-top:12px;">Code secret</label>
    <input
      type="password"
      name="secret"
      id="secret"
      placeholder="Entre ton code secret"
      required
      autocomplete="current-password"
    >

    <button class="btn" style="margin-top:14px;">Continuer</button>

  </form>

  {% if not participants %}
    <p style="margin-top:15px;">
      ⚠️ Aucun joueur enregistré.
      Demande à l’admin d’ajouter les participants.
    </p>
  {% endif %}

{% endblock %}
